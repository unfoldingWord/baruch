name: Deploy Staging

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Deploy to Staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging

      - name: Set secrets
        run: |
          echo "${{ secrets.ANTHROPIC_API_KEY_STAGING }}" | npx wrangler secret put ANTHROPIC_API_KEY --name baruch-staging
          echo "${{ secrets.BARUCH_API_KEY_STAGING }}" | npx wrangler secret put BARUCH_API_KEY --name baruch-staging
          echo "${{ secrets.ENGINE_API_KEY_STAGING }}" | npx wrangler secret put ENGINE_API_KEY --name baruch-staging
          echo "https://staging-api.btservant.ai" | npx wrangler secret put ENGINE_BASE_URL --name baruch-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
