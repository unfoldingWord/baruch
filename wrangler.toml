name = "baruch"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[observability]
enabled = true
head_sampling_rate = 1

[vars]
ENVIRONMENT = "production"
MAX_ORCHESTRATION_ITERATIONS = "10"
DEFAULT_ORG = "unfoldingWord"

# KV Namespaces
[[kv_namespaces]]
binding = "PROMPT_OVERRIDES"
id = "5ae97e75a69a4f8e8e342a80182fe49b"

# Durable Objects
[[durable_objects.bindings]]
name = "USER_SESSION"
class_name = "UserSession"

[[durable_objects.bindings]]
name = "USER_QUEUE"
class_name = "UserQueue"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserSession"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserQueue"]

# ──── Dev environment ────
[env.dev]
name = "baruch-dev"

[env.dev.vars]
ENVIRONMENT = "development"
MAX_ORCHESTRATION_ITERATIONS = "10"
DEFAULT_ORG = "unfoldingWord"

[[env.dev.kv_namespaces]]
binding = "PROMPT_OVERRIDES"
id = "49508b9cedcf4fa5881a4b7cceb94d79"

[[env.dev.durable_objects.bindings]]
name = "USER_SESSION"
class_name = "UserSession"

[[env.dev.durable_objects.bindings]]
name = "USER_QUEUE"
class_name = "UserQueue"

# ──── Staging environment ────
[env.staging]
name = "baruch-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
MAX_ORCHESTRATION_ITERATIONS = "10"
DEFAULT_ORG = "unfoldingWord"

[[env.staging.kv_namespaces]]
binding = "PROMPT_OVERRIDES"
id = "70bae395863e460998115642e7e63a08"

[[env.staging.durable_objects.bindings]]
name = "USER_SESSION"
class_name = "UserSession"

[[env.staging.durable_objects.bindings]]
name = "USER_QUEUE"
class_name = "UserQueue"
